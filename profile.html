<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | ประวัติส่วนตัว</title>
    <style>
        /* ส่วนของการตกแต่งเว็บไซต์ (CSS) พื้นฐาน */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        
        /* เมนูนำทาง (Navigation Bar) */
        nav {
            background-color: #2c3e50;
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            font-weight: bold;
        }
        nav a:hover {
            color: #1abc9c;
        }
        nav a.active {
            color: #1abc9c;
        }

        /* ส่วนเนื้อหาหลัก */
        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #1abc9c;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* การจัดวางข้อมูลส่วนตัว */
        .profile-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .info-box {
            flex: 1;
            min-width: 300px;
        }

        .info-box h3 {
            color: #1abc9c;
            margin-bottom: 15px;
        }

        .info-list {
            list-style-type: none;
            padding: 0;
        }

        .info-list li {
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .info-list li strong {
            display: inline-block;
            width: 120px;
            color: #2c3e50;
        }

        /* ส่วนของทักษะ (Skills) */
        .skills {
            margin-top: 20px;
        }
        .skill-tag {
            display: inline-block;
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        /* ส่วนท้าย (Footer) */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
