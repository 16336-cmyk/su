<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงานและรางวัล | แฟ้มสะสมผลงาน</title>
    <style>
        /* สไตล์พื้นฐาน */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* แถบเมนูด้านบน */
        header {
            background-color: #2c3e50;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #1abc9c;
        }

        /* ส่วนเนื้อหาหลัก */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1.title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }
        h1.title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #1abc9c;
            margin: 10px auto 0 auto;
        }

        /* การจัดวางกล่องผลงานเป็น Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 5px;
        }

        /* สไตล์ของกล่องผลงาน (Card) */
        .portfolio-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .portfolio-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        /* ส่วนรูปภาพผลงาน */
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd; /* สีเทาชั่วคราวระหว่างรอใส่รูป */
        }

        /* ส่วนเนื้อหาในกล่อง */
        .card-content {
            padding: 20px;
        }
        .card-tag {
            background-color: #e8f8f5;
            color: #1abc9c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.25rem;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }
        .card-text {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin: 0;
        }

        /* ส่วนท้ายเว็บ */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="profile.html">ประวัติส่วนตัว</a></li>
                <li><a href="education.html">ประวัติการศึกษา</a></li>
                <li><a href="award.html">ผลงาน</a></li>
                <li><a href="contact.html">ช่องทางการติดต่อ</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="title">ผลงานและรางวัล (Awards & Projects)</h1>

        <div class="portfolio-grid">

            <div class="portfolio-card">
                <img src="project1.jpg" alt="รูปภาพผลงาน 1" class="card-img">
                <div class="card-content">
                    <span class="card-tag">รางวัลชนะเลิศ</span>
