<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="education-section">
        <h2 class="section-title">ประวัติการศึกษา</h2>
        
        <div class="education-container">
            
            <div class="edu-card">
                <div class="edu-year">พ.ศ. 2563 - 2567</div>
                <div class="edu-details">
                    <h3 class="degree">ปริญญาตรี วิทยาศาสตรบัณฑิต (วิทยาการคอมพิวเตอร์)</h3>
                    <p class="school-name">มหาวิทยาลัยเทคโนโลยีตัวอย่าง</p>
                    <p class="gpa">เกรดเฉลี่ยสะสม: <strong>3.85</strong></p>
                </div>
            </div>

            <div class="edu-card">
                <div class="edu-year">พ.ศ. 2560 - 2563</div>
                <div class="edu-details">
                    <h3 class="degree">มัธยมศึกษาตอนปลาย (สายวิทย์-คณิต)</h3>
                    <p class="school-name">โรงเรียนมัธยมตัวอย่างวิทยา</p>
                    <p class="gpa">เกรดเฉลี่ยสะสม: <strong>3.90</strong></p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
</body>
</html>
