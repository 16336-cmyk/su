<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sakura-container"></div>

    <nav class="navbar">
        <div class="logo">Sakura<span>Space</span></div>
        <ul class="nav-links">
            <li><a href="index.html">หน้าหลัก</a></li>
            <li><a href="about.html">ประวัติส่วนตัว</a></li>
            <li><a href="education.html">ประวัติการศึกษา</a></li>
            <li><a href="portfolio.html">ผลงาน</a></li>
            <li><a href="contact.html" class="active">ติดต่อ</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="glass-card">
            <h2 class="section-title">✉️ ช่องทางการติดต่อ (Contact Me)</h2>
            <div class="contact-layout">
                <form class="contact-form" onsubmit="event.preventDefault(); alert('ส่งข้อความเรียบร้อยแล้วค่ะ!');">
                    <input type="text" placeholder="ชื่อของคุณ" required>
                    <input type="email" placeholder="อีเมลของคุณ" required>
                    <textarea rows="5" placeholder="เขียนข้อความถึงฉันที่นี่..." required></textarea>
                    <button type="submit" class="btn btn-primary">ส่งข้อความ</button>
                </form>
                <div class="contact-social">
                    <h3>ติดตามฉันได้ที่</h3>
                    <a href="https://github.com" target="_blank" class="social-link"><i class="fa-brands fa-github"></i> GitHub</a>
                    <a href="https://facebook.com" target="_blank" class="social-link"><i class="fa-brands fa-facebook"></i> Facebook</a>
                    <a href="mailto:example@email.com" class="social-link"><i class="fa-solid fa-envelope"></i> Email: cherry@sakura.com</a>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
